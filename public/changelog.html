    const LABELS = {
      'zh-TW': { title: '更新歷程', back: '← 返回首頁', new: '新功能', improve: '優化', change: '變更', fix: '修正', remove: '移除' },
      en:       { title: 'Changelog', back: '← Back to Home', new: 'New', improve: 'Improved', change: 'Changed', fix: 'Fixed', remove: 'Removed' },
      ja:       { title: '更新履歴', back: '← ホームに戻る', new: '新機能', improve: '改善', change: '変更', fix: '修正', remove: '削除' },
    };

    function render() {
      const lang = getLang();
      const l = LABELS[lang] || LABELS.en;
      const langKey = lang === 'zh-TW' ? 'zh' : lang;

      document.getElementById('html-root').lang = lang;
      document.title = l.title + ' — Twitch Channel Checker';
      document.getElementById('txt-logo').textContent = t('site.logo');
      document.getElementById('txt-title').textContent = l.title;
      document.getElementById('txt-back').textContent = l.back;
      document.getElementById('lang-switcher').innerHTML = langSwitcherHTML();

      const typeClass = { new: 'cl-new', improve: 'cl-improve', change: 'cl-change', fix: 'cl-fix', remove: 'cl-remove' };

      const html = CHANGELOG.map(entry => {
        const items = entry[langKey] || entry.en;
        const rows = items.map(item =>
          `<li class="cl-item">
            <span class="cl-tag ${typeClass[item.type] || ''}">${l[item.type] || item.type}</span>
            <span>${item.text}</span>
          </li>`
        ).join('');
        return `
          <div class="cl-entry">
            <div class="cl-header">
              <span class="cl-version">v${entry.version}</span>
              <span class="cl-date">${entry.date}</span>
            </div>
            <ul class="cl-list">${rows}</ul>
          </div>`;
      }).join('');

      document.getElementById('changelog-content').innerHTML = html;
    }

    function onLangChange() { render(); }
    render();
  </script>
